<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempate 6</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header
      class="header py-[24px] sticky top-0 left-0 z-[999] w-full transition-all duration-300"
    >
      <div class="container mx-auto px-4 xl:px-0">
        <div class="flex justify-between items-center relative">
          <!-- Hamburger Button (Mobile Only) -->
          <button
            id="mobile-menu-btn"
            class="xl:hidden text-[#252525] text-2xl"
            aria-label="Menu"
          >
            <i class="fa-solid fa-bars"></i>
          </button>

          <div
            class="h-[30px] sm:h-[39px] w-auto absolute left-1/2 -translate-x-1/2 xl:static xl:translate-x-0"
          >
            <a href="index.html">
              <img
                src="assets/images/logo.png"
                alt="Phương đông"
                class="h-full mx-auto"
              />
            </a>
          </div>

          <!-- Desktop Navigation -->
          <nav class="hidden xl:block">
            <ul class="flex gap-x-[32px]">
              <li>
                <a
                  href="#instruction"
                  class="text-[16px] font-bold text-[#252525] hover:text-[#252525] transition-colors relative pb-1 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-0 hover:after:w-[20px] after:h-[3px] after:bg-[#252525] after:rounded-full after:transition-all after:duration-300"
                  >Giới thiệu</a
                >
              </li>
              <li>
                <a
                  href="#object-client"
                  class="text-[16px] font-bold text-[#252525] hover:text-[#252525] transition-colors relative pb-1 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-0 hover:after:w-[20px] after:h-[3px] after:bg-[#252525] after:rounded-full after:transition-all after:duration-300"
                  >Đối tượng khách hàng</a
                >
              </li>
              <li>
                <a
                  href="#step"
                  class="text-[16px] font-bold text-[#252525] hover:text-[#252525] transition-colors relative pb-1 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-0 hover:after:w-[20px] after:h-[3px] after:bg-[#252525] after:rounded-full after:transition-all after:duration-300"
                  >Quy trình</a
                >
              </li>
              <li>
                <a
                  href="#table-price"
                  class="text-[16px] font-bold text-[#252525] hover:text-[#252525] transition-colors relative pb-1 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-0 hover:after:w-[20px] after:h-[3px] after:bg-[#252525] after:rounded-full after:transition-all after:duration-300"
                  >Bảng giá</a
                >
              </li>
              <li>
                <a
                  href="#feel-client"
                  class="text-[16px] font-bold text-[#252525] hover:text-[#252525] transition-colors relative pb-1 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-0 hover:after:w-[20px] after:h-[3px] after:bg-[#252525] after:rounded-full after:transition-all after:duration-300"
                  >Cảm nhận của khách hàng</a
                >
              </li>
              <li>
                <a
                  href="#list-doctor"
                  class="text-[16px] font-bold text-[#252525] hover:text-[#252525] transition-colors relative pb-1 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-0 hover:after:w-[20px] after:h-[3px] after:bg-[#252525] after:rounded-full after:transition-all after:duration-300"
                  >Đội ngũ bác sĩ</a
                >
              </li>
              <li>
                <a
                  href="#list-doctor"
                  class="text-[16px] font-bold text-[#252525] hover:text-[#252525] transition-colors relative pb-1 after:content-[''] after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2 after:w-0 hover:after:w-[20px] after:h-[3px] after:bg-[#252525] after:rounded-full after:transition-all after:duration-300"
                  >Hình ảnh & Video</a
                >
              </li>
            </ul>
          </nav>

          <!-- Call Button -->
          <a
            href="tel:19001806"
            class="inline-flex items-center gap-x-[10px] gap-y-[10px] h-[40px] px-2 md:px-[11px] rounded-[20px] bg-gradient-to-br from-[#3eed8b] to-[#0a9949] hover:from-[#0a9949] hover:to-[#3eed8b] transition-colors duration-300"
          >
            <img
              class="w-[26px] h-[26px] md:w-[26px] md:h-[26px] rounded-[50%] bg-white p-1 md:p-[5px]"
              src="assets/images/Phone, Call.png"
              alt=""
            />
            <span
              class="text-[14px] md:text-[16px] font-bold text-[#fff] hidden sm:block"
              >Gọi 1900 1806</span
            >
          </a>
        </div>
      </div>
    </header>

    <!-- Sidebar Mobile Menu -->
    <div
      id="mobile-sidebar"
      class="fixed inset-y-0 left-0 w-[280px] bg-white shadow-2xl z-[9999] transform -translate-x-full transition-transform duration-300 ease-in-out xl:hidden"
    >
      <div class="p-5 flex justify-between items-center border-b">
        <a href="index.html">
          <img src="assets/images/logo.png" alt="Phương đông" class="h-8" />
        </a>
        <button
          id="close-sidebar-btn"
          class="text-gray-500 hover:text-red-500 text-2xl"
        >
          <i class="fa-solid fa-times"></i>
        </button>
      </div>
      <nav class="p-5">
        <ul class="flex flex-col gap-4">
          <li>
            <a
              href="#"
              class="block text-[16px] font-bold text-[#252525] hover:text-[#0a9949] transition-colors duration-300"
              >Giới thiệu</a
            >
          </li>
          <li>
            <a
              href="#"
              class="block text-[16px] font-bold text-[#252525] hover:text-[#0a9949] transition-colors duration-300"
              >Đối tượng khách hàng</a
            >
          </li>
          <li>
            <a
              href="#"
              class="block text-[16px] font-bold text-[#252525] hover:text-[#0a9949] transition-colors duration-300"
              >Quy trình</a
            >
          </li>
          <li>
            <a
              href="#"
              class="block text-[16px] font-bold text-[#252525] hover:text-[#0a9949] transition-colors duration-300"
              >Bảng giá</a
            >
          </li>
          <li>
            <a
              href="#"
              class="block text-[16px] font-bold text-[#252525] hover:text-[#0a9949] transition-colors duration-300"
              >Cảm nhận của khách hàng</a
            >
          </li>
          <li>
            <a
              href="#"
              class="block text-[16px] font-bold text-[#252525] hover:text-[#0a9949] transition-colors duration-300"
              >Đội ngũ bác sĩ</a
            >
          </li>
          <li>
            <a
              href="#"
              class="block text-[16px] font-bold text-[#252525] hover:text-[#0a9949] transition-colors duration-300"
              >Hình ảnh & Video</a
            >
          </li>
        </ul>
      </nav>
    </div>

    <!-- Overlay for Sidebar -->
    <div
      id="sidebar-overlay"
      class="fixed inset-0 bg-black/50 z-[50] hidden xl:hidden"
    ></div>
    <!-- End Header -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
